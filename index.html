<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stable Crypto Dashboard</title>

<style>
body{
 margin:0;
 background:#0f1115;
 color:#fff;
 font-family:Arial;
 padding-bottom:80px;
}

header{
 padding:12px;
 text-align:center;
 border-bottom:1px solid #222;
 font-size:15px;
}

#toccataBox{
 padding:12px;
 text-align:center;
 background:#151922;
 border-bottom:1px solid #222;
}

#toccataTitle{color:#ffd000;font-weight:bold;}
#toccataCountdown{color:#00ff9d;font-size:18px;font-weight:bold;}

.box{
 margin:12px;
 padding:14px;
 border-radius:12px;
 font-weight:bold;
 text-align:center;
}

.price{font-size:28px;margin-top:6px;}

.kas{background:#121a14;color:#00ff9d;}
.btc{background:#1a1411;color:#ff9d00;}
.eth{background:#12131a;color:#8c8cff;}
.sol{background:#141a12;color:#7dffb2;}
.sui{background:#10131c;color:#6aa8ff;}
.xrp{background:#1a1a12;color:#ffd37a;}
.tao{background:#121a1a;color:#7affea;}

table{
 width:100%;
 border-collapse:collapse;
 font-size:13px;
 margin-top:10px;
}

th,td{
 padding:8px;
 text-align:center;
 border-bottom:1px solid #222;
}

.green{color:#00ff9d;font-weight:bold;}
.red{color:#ff4d4d;font-weight:bold;}
.yellow{color:#ffd000;font-weight:bold;}

.rank{
 font-size:12px;
 opacity:0.7;
 margin-bottom:5px;
}
</style>
</head>

<body>

<header>
📊 Stable Crypto Dashboard (No 0 Price / No Data Loss)
</header>

<div id="toccataBox">
 <div id="toccataTitle">🚀 Toccata Mainnet (KST)</div>
 <div id="toccataCountdown">loading...</div>
</div>

<div id="boxes"></div>

<table>
<thead>
<tr>
<th>COIN</th>
<th>PRICE</th>
<th>KRW</th>
<th>24h</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

let KRW = 1300;

// ================= SAFE VALUE HELPER =================
function safeNum(v){
 return (v === null || v === undefined || isNaN(v)) ? null : Number(v);
}

// ================= STATE (CRITICAL) =================
let state = {
 BTC:null, ETH:null, SOL:null, SUI:null, XRP:null,
 KAS:null,
 TAO:null
};

// ================= FX =================
async function rate(){
 try{
  const r = await fetch("https://open.er-api.com/v6/latest/USD");
  const d = await r.json();
  if(d?.rates?.KRW) KRW = d.rates.KRW;
 }catch(e){}
}

// ================= BINANCE ENGINE =================
async function binance(symbol){
 try{
  const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`);
  const d = await r.json();

  return {
   price: safeNum(d?.lastPrice),
   change: safeNum(d?.priceChangePercent)
  };
 }catch(e){
  return null;
 }
}

// ================= KAS ENGINE (INDEPENDENT) =================
async function kasEngine(){
 try{
  const r = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=kaspa");
  const d = await r.json();

  if(d?.[0]){
   state.KAS = {
    price: d[0].current_price,
    change: d[0].price_change_percentage_24h
   };
  }
 }catch(e){}
}

// ================= TAO ENGINE =================
async function taoEngine(){
 try{
  const r = await fetch("https://api.coingecko.com/api/v6/coins/markets?vs_currency=usd&ids=bittensor");
  const d = await r.json();

  if(d?.[0]){
   state.TAO = {
    price: d[0].current_price,
    change: d[0].price_change_percentage_24h
   };
  }
 }catch(e){}
}

// ================= TOCCATA =================
function toccata(){
 const target = new Date("2026-07-01T01:15:00+09:00").getTime();
 const now = Date.now();
 const diff = target - now;

 if(diff<=0){
  document.getElementById("toccataCountdown").innerHTML="🚀 LIVE";
  return;
 }

 const d=Math.floor(diff/86400000);
 const h=Math.floor(diff%86400000/3600000);
 const m=Math.floor(diff%3600000/60000);
 const s=Math.floor(diff%60000/1000);

 document.getElementById("toccataCountdown").innerHTML=
 `D-${d} | ${h}h ${m}m ${s}s`;
}

// ================= SAFE UPDATE =================
async function update(){

 await rate();

 const [btc,eth,sol,sui,xrp] = await Promise.all([
  binance("BTCUSDT"),
  binance("ETHUSDT"),
  binance("SOLUSDT"),
  binance("SUIUSDT"),
  binance("XRPUSDT")
 ]);

 if(btc) state.BTC = btc;
 if(eth) state.ETH = eth;
 if(sol) state.SOL = sol;
 if(sui) state.SUI = sui;
 if(xrp) state.XRP = xrp;

 await Promise.all([
  kasEngine(),
  taoEngine()
 ]);
}

// ================= RENDER (NO ZERO GUARANTEE) =================
function render(){

 const list = [
  {name:"BTC", cls:"btc", data:state.BTC},
  {name:"ETH", cls:"eth", data:state.ETH},
  {name:"SOL", cls:"sol", data:state.SOL},
  {name:"SUI", cls:"sui", data:state.SUI},
  {name:"XRP", cls:"xrp", data:state.XRP},
  {name:"KAS", cls:"kas", data:state.KAS},
  {name:"TAO", cls:"tao", data:state.TAO}
 ];

 let htmlBox="";
 let htmlTable="";

 list.forEach(c=>{

  // 🚨 핵심: null이면 "이전값 유지", 0 출력 금지
  if(!c.data || c.data.price === null) return;

  const price = c.data.price;
  const change = c.data.change ?? 0;

  const color =
   change > 0 ? "green" :
   change < 0 ? "red" : "yellow";

  htmlTable+=`
  <tr>
   <td>${c.name}</td>
   <td>$${price}</td>
   <td>₩${(price * KRW).toLocaleString()}</td>
   <td class="${color}">${change.toFixed(2)}%</td>
  </tr>`;
 });

 document.getElementById("table").innerHTML = htmlTable;

 // BIG BOX (KAS + SUI)
 const big = list.filter(x=>x.name==="KAS"||x.name==="SUI");

 big.forEach((c,i)=>{

  if(!c.data) return;

  const color =
   c.data.change > 0 ? "green" :
   c.data.change < 0 ? "red" : "yellow";

  htmlBox+=`
  <div class="box ${c.cls}">
   <div class="rank">#${i+1}</div>
   ${c.name}
   <div class="price">
    $${c.data.price}
    <br>
    <span class="${color}">
     ${c.data.change.toFixed(2)}%
    </span>
   </div>
  </div>`;
 });

 document.getElementById("boxes").innerHTML = htmlBox;
}

// ================= LOOP =================
async function start(){
 await update();
 render();
 toccata();
}

start();
setInterval(start, 30000);
setInterval(toccata, 1000);

</script>

</body>
</html>
