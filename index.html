<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crypto Live 24h</title>
<meta name="theme-color" content="#0f1115">

<style>
body {
 margin:0;
 background:#0f1115;
 color:#fff;
 font-family:Arial;
}

header {
 padding:12px;
 text-align:center;
 border-bottom:1px solid #222;
 font-size:15px;
}

table {
 width:100%;
 border-collapse:collapse;
 font-size:13px;
}

th, td {
 padding:9px;
 text-align:center;
 border-bottom:1px solid #222;
}

small { opacity:0.6; }

.green { color:#00ff9d; }
.red { color:#ff4d4d; }
.yellow { color:#ffd000; }
</style>
</head>

<body>

<header>
📊 Crypto Live (24h + RSI + FX)
<br>
<small>30초 업데이트 / 60초 환율</small>
</header>

<table>
<thead>
<tr>
<th>코인</th>
<th>USD</th>
<th>KRW</th>
<th>24h</th>
<th>RSI</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script>

const coins = [
 "bitcoin",
 "ethereum",
 "kaspa",
 "sui",
 "bittensor",
 "stellar",
 "ripple",
 "canton"
];

let KRW_RATE = 1300;
let history = {};

// ==========================
// RSI
// ==========================
function calcRSI(arr){
 if(arr.length < 15) return 50;

 let gain = 0;
 let loss = 0;

 for(let i=1;i<arr.length;i++){
  let diff = arr[i] - arr[i-1];
  if(diff > 0) gain += diff;
  else loss += Math.abs(diff);
 }

 let avgGain = gain / arr.length;
 let avgLoss = loss / arr.length;

 if(avgLoss === 0) return 100;

 let rs = avgGain / avgLoss;
 return 100 - (100 / (1 + rs));
}

// ==========================
// 환율 (fallback 2개)
// ==========================
async function updateRate(){
 try {
  const res = await fetch("https://open.er-api.com/v6/latest/USD");
  const data = await res.json();
  KRW_RATE = data.rates.KRW || 1300;
 } catch(e){
  try {
   const res2 = await fetch("https://api.exchangerate.host/latest?base=USD&symbols=KRW");
   const data2 = await res2.json();
   KRW_RATE = data2.rates.KRW || 1300;
  } catch(e2){
   KRW_RATE = 1300;
  }
 }
}

// ==========================
// 코인 데이터
// ==========================
async function load(){

 try {

  const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${coins.join(",")}`;
  const res = await fetch(url);
  const data = await res.json();

  let html = "";

  data.forEach(c => {

   // RSI history
   if(!history[c.id]) history[c.id] = [];
   history[c.id].push(c.current_price);

   if(history[c.id].length > 20){
    history[c.id].shift();
   }

   let rsi = calcRSI(history[c.id]).toFixed(1);

   // KRW
   let krw = (c.current_price * KRW_RATE).toLocaleString();

   // 24h change
   let ch = c.price_change_percentage_24h;

   let chColor =
     ch > 0 ? "green" :
     ch < 0 ? "red" :
     "yellow";

   // RSI color
   let rsiColor =
     rsi > 70 ? "red" :
     rsi < 30 ? "green" :
     "yellow";

   html += `
   <tr>
    <td>${c.symbol.toUpperCase()}</td>
    <td>$${c.current_price.toFixed(4)}</td>
    <td>₩${krw}</td>
    <td class="${chColor}">
      ${ch ? ch.toFixed(2) : "0.00"}%
    </td>
    <td class="${rsiColor}">${rsi}</td>
   </tr>
   `;
  });

  document.getElementById("table").innerHTML = html;

 } catch(e){
  document.getElementById("table").innerHTML =
   "<tr><td colspan='5'>데이터 로딩 실패</td></tr>";
 }

}

// ==========================
// 실행
// ==========================
updateRate();
load();

setInterval(load, 30000);
setInterval(updateRate, 60000);

</script>

</body>
</html>
