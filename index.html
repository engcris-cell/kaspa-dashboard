<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crypto Dashboard Stable</title>

<style>
body{
 margin:0;
 background:#0f1115;
 color:#fff;
 font-family:Arial;
 padding-bottom:80px;
}

header{
 padding:12px;
 text-align:center;
 border-bottom:1px solid #222;
 font-size:15px;
}

#toccataBox{
 padding:12px;
 text-align:center;
 background:#151922;
 border-bottom:1px solid #222;
}

#toccataTitle{
 color:#ffd000;
 font-weight:bold;
}

#toccataCountdown{
 color:#00ff9d;
 font-size:18px;
 font-weight:bold;
}

.box{
 margin:12px;
 padding:14px;
 border-radius:12px;
 font-weight:bold;
 text-align:center;
}

.price{font-size:28px;margin-top:6px;}

.kas{background:#121a14;color:#00ff9d;}
.sui{background:#10131c;color:#6aa8ff;}

table{
 width:100%;
 border-collapse:collapse;
 font-size:13px;
 margin-top:10px;
}

th,td{
 padding:8px;
 text-align:center;
 border-bottom:1px solid #222;
}

.green{color:#00ff9d;font-weight:bold;}
.red{color:#ff4d4d;font-weight:bold;}
.yellow{color:#ffd000;font-weight:bold;}

.rank{
 font-size:12px;
 opacity:0.7;
 margin-bottom:5px;
}

</style>
</head>

<body>

<header>
📊 Crypto Dashboard (Stable Version)
</header>

<div id="toccataBox">
 <div id="toccataTitle">🚀 Toccata Mainnet (KST)</div>
 <div id="toccataCountdown">loading...</div>
</div>

<div id="boxes"></div>

<table>
<thead>
<tr>
<th>COIN</th>
<th>PRICE</th>
<th>KRW</th>
<th>24h</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

let KRW = 1300;

// ================= FX (fallback safe) =================
async function rate(){
 try{
  const r = await fetch("https://open.er-api.com/v6/latest/USD");
  const d = await r.json();
  if(d?.rates?.KRW){
    KRW = d.rates.KRW;
  }
 }catch(e){
  console.log("KRW fallback used");
 }
}

// ================= SINGLE API CALL (핵심 안정화) =================
async function getAll(){
 try{
  const r = await fetch(
   "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=kaspa,sui,bitcoin,ethereum,solana"
  );
  const d = await r.json();
  return d || [];
 }catch(e){
  console.log("Coin API error");
  return [];
 }
}

// ================= TOCCATA =================
function toccata(){
 const target = new Date("2026-07-01T01:15:00+09:00").getTime();
 const now = Date.now();
 const diff = target - now;

 if(diff<=0){
  document.getElementById("toccataCountdown").innerHTML="🚀 LIVE";
  return;
 }

 const d=Math.floor(diff/86400000);
 const h=Math.floor(diff%86400000/3600000);
 const m=Math.floor(diff%3600000/60000);
 const s=Math.floor(diff%60000/1000);

 document.getElementById("toccataCountdown").innerHTML=
 `D-${d} | ${h}h ${m}m ${s}s`;
}

// ================= SAFE STATE =================
let lastData = [];

// ================= MAIN =================
async function load(){

 const data = await getAll();

 if(data.length > 0){
  lastData = data; // 성공 데이터 저장
 }

 const show = lastData;

 // ================= BIG BOX (KAS / SUI only) =================
 const bigCoins = ["kaspa","sui"];

 let bigHtml="";

 show.filter(c=>bigCoins.includes(c.id)).forEach((c,i)=>{

  const color =
   c.price_change_percentage_24h > 0 ? "green" :
   c.price_change_percentage_24h < 0 ? "red" : "yellow";

  const cls = c.id === "kaspa" ? "kas" : "sui";

  bigHtml+=`
  <div class="box ${cls}">
   <div class="rank">#${i+1}</div>
   ${c.symbol.toUpperCase()}
   <div class="price">
    $${c.current_price}
    <br>
    <span class="${color}">
     ${c.price_change_percentage_24h.toFixed(2)}%
    </span>
   </div>
  </div>`;
 });

 document.getElementById("boxes").innerHTML=bigHtml;

 // ================= TABLE =================
 let table="";

 show.forEach(c=>{

  const color =
   c.price_change_percentage_24h > 0 ? "green" :
   c.price_change_percentage_24h < 0 ? "red" : "yellow";

  table+=`
  <tr>
   <td>${c.symbol.toUpperCase()}</td>
   <td>$${c.current_price}</td>
   <td>₩${(c.current_price * KRW).toLocaleString()}</td>
   <td class="${color}">${c.price_change_percentage_24h.toFixed(2)}%</td>
  </tr>`;
 });

 document.getElementById("table").innerHTML=table;
}

// ================= START =================
async function start(){
 await rate();
 await load();
 toccata();
}

start();

setInterval(start,30000);
setInterval(toccata,1000);

</script>

</body>
</html>
