<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crypto Engine Separated Dashboard</title>

<style>
body{
 margin:0;
 background:#0f1115;
 color:#fff;
 font-family:Arial;
 padding-bottom:80px;
}

header{
 padding:12px;
 text-align:center;
 border-bottom:1px solid #222;
 font-size:15px;
}

#toccataBox{
 padding:12px;
 text-align:center;
 background:#151922;
 border-bottom:1px solid #222;
}

#toccataTitle{
 color:#ffd000;
 font-weight:bold;
}

#toccataCountdown{
 color:#00ff9d;
 font-size:18px;
 font-weight:bold;
}

.box{
 margin:12px;
 padding:14px;
 border-radius:12px;
 font-weight:bold;
 text-align:center;
}

.price{font-size:28px;margin-top:6px;}

.kas{background:#121a14;color:#00ff9d;}
.btc{background:#1a1411;color:#ff9d00;}
.eth{background:#12131a;color:#8c8cff;}
.sol{background:#141a12;color:#7dffb2;}
.sui{background:#10131c;color:#6aa8ff;}
.xrp{background:#1a1a12;color:#ffd37a;}
.tao{background:#121a1a;color:#7affea;}

table{
 width:100%;
 border-collapse:collapse;
 font-size:13px;
 margin-top:10px;
}

th,td{
 padding:8px;
 text-align:center;
 border-bottom:1px solid #222;
}

.green{color:#00ff9d;font-weight:bold;}
.red{color:#ff4d4d;font-weight:bold;}
.yellow{color:#ffd000;font-weight:bold;}

.rank{
 font-size:12px;
 opacity:0.7;
 margin-bottom:5px;
}

</style>
</head>

<body>

<header>
📊 Engine Separated Crypto Dashboard (Stable Core)
</header>

<div id="toccataBox">
 <div id="toccataTitle">🚀 Toccata Mainnet (KST)</div>
 <div id="toccataCountdown">loading...</div>
</div>

<div id="boxes"></div>

<table>
<thead>
<tr>
<th>COIN</th>
<th>PRICE</th>
<th>KRW</th>
<th>24h</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

let KRW = 1300;

// ================= FX =================
async function rate(){
 try{
  const r = await fetch("https://open.er-api.com/v6/latest/USD");
  const d = await r.json();
  if(d?.rates?.KRW) KRW = d.rates.KRW;
 }catch(e){}
}

// ================= BINANCE ENGINE =================
let binanceState = [];

async function binanceEngine(){
 const symbols = [
  ["BTCUSDT","BTC","btc"],
  ["ETHUSDT","ETH","eth"],
  ["SOLUSDT","SOL","sol"],
  ["SUIUSDT","SUI","sui"],
  ["XRPUSDT","XRP","xrp"]
 ];

 const results = await Promise.all(
  symbols.map(async ([sym,name,cls])=>{
   try{
    const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${sym}`);
    const d = await r.json();
    return {
     name,
     price:+d.lastPrice,
     change:+d.priceChangePercent,
     cls
    };
   }catch(e){
    return null;
   }
  })
 );

 binanceState = results.filter(Boolean);
}

// ================= KAS ENGINE (INDEPENDENT) =================
let kasState = {
 name:"KAS",
 price:0,
 change:0,
 cls:"kas"
};

async function kasEngine(){
 try{
  const r = await fetch(
   "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=kaspa"
  );
  const d = await r.json();

  if(d?.[0]){
   kasState = {
    name:"KAS",
    price:d[0].current_price,
    change:d[0].price_change_percentage_24h,
    cls:"kas"
   };
  }

 }catch(e){
  // fallback 유지
 }
}

// ================= TAO ENGINE =================
let taoState = null;

async function taoEngine(){
 try{
  const r = await fetch(
   "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bittensor"
  );
  const d = await r.json();

  if(d?.[0]){
   taoState = {
    name:"TAO",
    price:d[0].current_price,
    change:d[0].price_change_percentage_24h,
    cls:"tao"
   };
  }

 }catch(e){}
}

// ================= TOCCATA =================
function toccata(){
 const target = new Date("2026-07-01T01:15:00+09:00").getTime();
 const now = Date.now();
 const diff = target - now;

 if(diff<=0){
  document.getElementById("toccataCountdown").innerHTML="🚀 LIVE";
  return;
 }

 const d=Math.floor(diff/86400000);
 const h=Math.floor(diff%86400000/3600000);
 const m=Math.floor(diff%3600000/60000);
 const s=Math.floor(diff%60000/1000);

 document.getElementById("toccataCountdown").innerHTML=
 `D-${d} | ${h}h ${m}m ${s}s`;
}

// ================= RENDER ENGINE =================
function render(){

 const data = [
  ...binanceState,
  kasState,
  ...(taoState ? [taoState] : [])
 ];

 // BIG BOX (KAS + SUI)
 const big = data.filter(c=>c.name==="KAS"||c.name==="SUI");

 let bigHtml="";

 big.forEach((c,i)=>{

  const color =
   c.change>0 ? "green" :
   c.change<0 ? "red" : "yellow";

  bigHtml+=`
  <div class="box ${c.cls}">
   <div class="rank">#${i+1}</div>
   ${c.name}
   <div class="price">
    $${c.price}
    <br>
    <span class="${color}">
     ${c.change.toFixed(2)}%
    </span>
   </div>
  </div>`;
 });

 document.getElementById("boxes").innerHTML=bigHtml;

 // TABLE
 let table="";

 data.forEach(c=>{

  const color =
   c.change>0 ? "green" :
   c.change<0 ? "red" : "yellow";

  table+=`
  <tr>
   <td>${c.name}</td>
   <td>$${c.price}</td>
   <td>₩${(c.price * KRW).toLocaleString()}</td>
   <td class="${color}">${c.change.toFixed(2)}%</td>
  </tr>`;
 });

 document.getElementById("table").innerHTML=table;
}

// ================= MAIN LOOP =================
async function start(){

 await rate();

 await Promise.all([
  binanceEngine(),
  kasEngine(),
  taoEngine()
 ]);

 render();
 toccata();
}

start();

setInterval(start,30000);
setInterval(toccata,1000);

</script>

</body>
</html>
