<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crypto Ultimate Dashboard</title>
<meta name="theme-color" content="#0f1115">

<style>
body{
    margin:0;
    background:#0f1115;
    color:#fff;
    font-family:Arial,sans-serif;
    padding-bottom:80px;
}

header{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #222;
    font-size:15px;
}

#toccataBox{
    padding:12px;
    text-align:center;
    background:#151922;
    border-bottom:1px solid #222;
}

#toccataTitle{
    color:#ffd000;
    font-weight:bold;
    margin-bottom:5px;
}

#toccataCountdown{
    color:#00ff9d;
    font-size:18px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}

th,td{
    padding:9px;
    text-align:center;
    border-bottom:1px solid #222;
}

.green{ color:#00ff9d; font-weight:bold; }
.red{ color:#ff4d4d; font-weight:bold; }
.yellow{ color:#ffd000; font-weight:bold; }

/* ===================== */
/* KAS BIG CARD */
/* ===================== */
#kasBigBox{
    margin:12px;
    padding:16px;
    text-align:center;
    background:#121a14;
    border:1px solid #1f2a22;
    border-radius:12px;
    color:#00ff9d;
    font-weight:bold;
}

#kasTitle{
    font-size:14px;
    opacity:0.8;
}

#kasPrice{
    font-size:28px;
    margin-top:8px;
}

#kasChange{
    margin-top:6px;
    font-size:14px;
}

</style>
</head>

<body>

<header>
📊 Crypto Ultimate Dashboard
<br>
<small>BTC / ETH REAL RSI + Altcoins + FX</small>
</header>

<div id="toccataBox">
    <div id="toccataTitle">
        🚀 Toccata Mainnet Activation
    </div>

    <div id="toccataCountdown">계산중...</div>
</div>

<table>
<thead>
<tr>
<th>코인</th>
<th>USD</th>
<th>KRW</th>
<th>24h</th>
<th>RSI</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<!-- ===================== -->
<!-- 🔥 KAS BIG BOX -->
<!-- ===================== -->
<div id="kasBigBox">
    <div id="kasTitle">💰 KASPA (Kaspa)</div>
    <div id="kasPrice">loading...</div>
    <div id="kasChange"></div>
</div>

<script>

// =======================
// KRW RATE
// =======================
let KRW_RATE = 1300;

// =======================
// BINANCE
// =======================
const binanceCoins = [
 {symbol:"BTCUSDT",name:"BTC"},
 {symbol:"ETHUSDT",name:"ETH"}
];

// =======================
// COINGECKO LIST
// =======================
const geckoCoins = [
 "kaspa",
 "sui",
 "bittensor",
 "ondo-finance",
 "near",
 "stellar",
 "ripple"
];

// =======================
// RSI
// =======================
function calcRSI(closes, period=14){

 if(closes.length < period + 1) return 50;

 let gains = 0;
 let losses = 0;

 for(let i=closes.length-period;i<closes.length;i++){
   let diff = closes[i] - closes[i-1];
   if(diff > 0) gains += diff;
   else losses += Math.abs(diff);
 }

 let avgGain = gains / period;
 let avgLoss = losses / period;

 if(avgLoss === 0) return 100;

 let rs = avgGain / avgLoss;

 return 100 - (100 / (1 + rs));
}

// =======================
// TOCCATA COUNTDOWN (KST)
// =======================
function updateToccataCountdown(){

 const target =
 new Date("2026-07-01T01:15:00+09:00").getTime();

 const now =
 new Date().getTime();

 const diff =
 target - now;

 if(diff <= 0){
   document.getElementById("toccataCountdown").innerHTML =
   "🚀 TOCCATA LIVE";
   return;
 }

 const days = Math.floor(diff/(1000*60*60*24));
 const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
 const mins = Math.floor((diff%(1000*60*60))/(1000*60));
 const secs = Math.floor((diff%(1000*60))/1000);

 document.getElementById("toccataCountdown").innerHTML =
 `D-${days} | ${hours}h ${mins}m ${secs}s`;
}

// =======================
// FX RATE
// =======================
async function updateRate(){
 try{
   const res = await fetch("https://open.er-api.com/v6/latest/USD");
   const data = await res.json();
   KRW_RATE = data.rates.KRW || 1300;
 }catch(e){
   KRW_RATE = 1300;
 }
}

// =======================
// BINANCE DATA
// =======================
async function getBinance(symbol){

 const priceRes =
 await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
 const priceData = await priceRes.json();

 const changeRes =
 await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`);
 const changeData = await changeRes.json();

 const candleRes =
 await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1m&limit=50`);
 const candles = await candleRes.json();

 const closes = candles.map(c => parseFloat(c[4]));

 return {
   price: parseFloat(priceData.price),
   change: parseFloat(changeData.priceChangePercent),
   rsi: calcRSI(closes)
 };
}

// =======================
// COINGECKO
// =======================
async function getGecko(){

 const url =
 `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${geckoCoins.join(",")}`;

 const res = await fetch(url);
 return await res.json();
}

// =======================
// MAIN TABLE
// =======================
async function load(){

 let html = "";

 for(const coin of binanceCoins){

   const d = await getBinance(coin.symbol);

   const krw = (d.price * KRW_RATE).toLocaleString();

   const rsiColor =
   d.rsi > 70 ? "red" :
   d.rsi < 30 ? "green" : "yellow";

   const chColor =
   d.change > 0 ? "green" :
   d.change < 0 ? "red" : "yellow";

   html += `
   <tr>
     <td>${coin.name}</td>
     <td>$${d.price.toFixed(2)}</td>
     <td>₩${krw}</td>
     <td class="${chColor}">${d.change.toFixed(2)}%</td>
     <td class="${rsiColor}">${d.rsi.toFixed(1)}</td>
   </tr>`;
 }

 const alts = await getGecko();

 alts.forEach(c=>{

   const krw = (c.current_price * KRW_RATE).toLocaleString();
   const ch = c.price_change_percentage_24h || 0;

   const chColor =
   ch > 0 ? "green" :
   ch < 0 ? "red" : "yellow";

   html += `
   <tr>
     <td>${c.symbol.toUpperCase()}</td>
     <td>$${c.current_price.toFixed(4)}</td>
     <td>₩${krw}</td>
     <td class="${chColor}">${ch.toFixed(2)}%</td>
     <td class="yellow">--</td>
   </tr>`;
 });

 document.getElementById("table").innerHTML = html;
}

// =======================
// 🔥 KAS BIG BOX (separate)
// =======================
async function updateKas(){

 try{
   const res = await fetch(
   "https://api.coingecko.com/api/v3/simple/price?ids=kaspa&vs_currencies=usd,krw&include_24hr_change=true"
   );

   const data = await res.json();

   const price = data.kaspa.usd;
   const krw = data.kaspa.krw;
   const change = data.kaspa.usd_24h_change;

   document.getElementById("kasPrice").innerHTML =
   `$${price} | ₩${krw}`;

   const color =
   change > 0 ? "green" :
   change < 0 ? "red" : "yellow";

   document.getElementById("kasChange").innerHTML =
   `<span class="${color}">
   24h: ${change.toFixed(2)}%
   </span>`;

 }catch(e){
   document.getElementById("kasPrice").innerHTML =
   "KAS 데이터 없음";
 }
}

// =======================
// START
// =======================
updateRate();
load();
updateKas();
updateToccataCountdown();

setInterval(load,30000);
setInterval(updateRate,60000);
setInterval(updateKas,10000);
setInterval(updateToccataCountdown,1000);

</script>

</body>
</html>
