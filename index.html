<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Ultimate Dashboard SAFE</title>

<style>
body{
 margin:0;
 background:#0f1115;
 color:#fff;
 font-family:Arial;
 padding-bottom:80px;
}

header{
 padding:12px;
 text-align:center;
 border-bottom:1px solid #222;
}

table{
 width:100%;
 border-collapse:collapse;
 font-size:13px;
}

th,td{
 padding:8px;
 text-align:center;
 border-bottom:1px solid #222;
}

.green{color:#00ff9d;font-weight:bold;}
.red{color:#ff4d4d;font-weight:bold;}
.yellow{color:#ffd000;font-weight:bold;}

.box{
 margin:12px;
 padding:14px;
 border-radius:12px;
 text-align:center;
 font-weight:bold;
}

.kas{background:#121a14;color:#00ff9d;}
.sui{background:#10131c;color:#6aa8ff;}
.cc{background:#1a1212;color:#ffb84d;}

.price{font-size:26px;margin-top:6px;}
</style>
</head>

<body>

<header>
📊 SAFE Crypto Dashboard
</header>

<table>
<thead>
<tr>
<th>COIN</th><th>USD</th><th>KRW</th><th>24h</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div class="box kas">
💰 KAS
<div id="kas">loading...</div>
</div>

<div class="box sui">
💎 SUI
<div id="sui">loading...</div>
</div>

<div class="box cc">
🔶 CC (Canton)
<div id="cc">loading...</div>
</div>

<script>

let KRW = 1300;

// ================= KRW RATE =================
async function rate(){
 try{
  const r = await fetch("https://open.er-api.com/v6/latest/USD");
  const d = await r.json();
  KRW = d.rates.KRW || 1300;
 }catch(e){}
}

// ================= SAFE FETCH =================
async function safe(url){
 try{
  const r = await fetch(url);
  return await r.json();
 }catch(e){
  return null;
 }
}

// ================= TABLE =================
async function loadTable(){

 const btc = await safe("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
 const eth = await safe("https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT");

 let html="";

 if(btc){
  const p=+btc.price;
  html+=`
  <tr>
    <td>BTC</td>
    <td>$${p.toFixed(2)}</td>
    <td>₩${(p*KRW).toLocaleString()}</td>
    <td class="green">live</td>
  </tr>`;
 }

 if(eth){
  const p=+eth.price;
  html+=`
  <tr>
    <td>ETH</td>
    <td>$${p.toFixed(2)}</td>
    <td>₩${(p*KRW).toLocaleString()}</td>
    <td class="yellow">live</td>
  </tr>`;
 }

 document.getElementById("table").innerHTML=html;
}

// ================= KAS =================
async function kas(){
 const d = await safe("https://api.coingecko.com/api/v3/simple/price?ids=kaspa&vs_currencies=usd");

 if(!d?.kaspa){
  document.getElementById("kas").innerHTML="no data";
  return;
 }

 const p=d.kaspa.usd;

 document.getElementById("kas").innerHTML=
 `$${p} | ₩${(p*KRW).toLocaleString()}`;
}

// ================= SUI =================
async function sui(){
 const d = await safe("https://api.coingecko.com/api/v3/simple/price?ids=sui&vs_currencies=usd");

 if(!d?.sui){
  document.getElementById("sui").innerHTML="no data";
  return;
 }

 const p=d.sui.usd;

 document.getElementById("sui").innerHTML=
 `$${p} | ₩${(p*KRW).toLocaleString()}`;
}

// ================= CC (CANTON SAFE) =================
async function cc(){
 const d = await safe("https://api.coingecko.com/api/v3/simple/price?ids=canton&vs_currencies=usd");

 if(!d?.canton){
  document.getElementById("cc").innerHTML="no data (CC)";
  return;
 }

 const p=d.canton.usd;

 document.getElementById("cc").innerHTML=
 `$${p} | ₩${(p*KRW).toLocaleString()}`;
}

// ================= START =================
async function start(){
 await rate();
 loadTable();
 kas();
 sui();
 cc();
}

start();

setInterval(start,30000);

</script>

</body>
</html>
