<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crypto REAL RSI</title>
<meta name="theme-color" content="#0f1115">

<style>
body {
 margin:0;
 background:#0f1115;
 color:#fff;
 font-family:Arial;
}

header {
 padding:12px;
 text-align:center;
 border-bottom:1px solid #222;
 font-size:15px;
}

table {
 width:100%;
 border-collapse:collapse;
 font-size:13px;
}

th, td {
 padding:9px;
 text-align:center;
 border-bottom:1px solid #222;
}

.green { color:#00ff9d; }
.red { color:#ff4d4d; }
.yellow { color:#ffd000; }

small { opacity:0.6; }
</style>
</head>

<body>

<header>
📊 Crypto Live (REAL RSI - 1m Candles)
<br>
<small>BTC / ETH / Alt + RSI (Binance OHLC)</small>
</header>

<table>
<thead>
<tr>
<th>코인</th>
<th>USD</th>
<th>KRW</th>
<th>24h</th>
<th>RSI</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script>

// Binance 기반 (RSI 제대로 나오는 구조)
const coins = [
 {symbol:"BTCUSDT", name:"BTC"},
 {symbol:"ETHUSDT", name:"ETH"}
];

let KRW_RATE = 1300;

// ==========================
// RSI (진짜 Wilder 방식)
// ==========================
function calcRSI(closes, period=14){
 if(closes.length < period + 1) return 50;

 let gains = 0;
 let losses = 0;

 for(let i=1;i<=period;i++){
  let diff = closes[closes.length - i] - closes[closes.length - i - 1];
  if(diff > 0) gains += diff;
  else losses += Math.abs(diff);
 }

 let avgGain = gains / period;
 let avgLoss = losses / period;

 if(avgLoss === 0) return 100;

 let rs = avgGain / avgLoss;
 return 100 - (100 / (1 + rs));
}

// ==========================
// 환율
// ==========================
async function updateRate(){
 try {
  const res = await fetch("https://open.er-api.com/v6/latest/USD");
  const data = await res.json();
  KRW_RATE = data.rates.KRW || 1300;
 } catch(e){
  KRW_RATE = 1300;
 }
}

// ==========================
// Binance 캔들 데이터 (진짜 RSI 핵심)
// ==========================
async function getCandles(symbol){

 const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1m&limit=50`;

 const res = await fetch(url);
 const data = await res.json();

 // close price만 추출
 return data.map(c => parseFloat(c[4]));
}

// ==========================
// 현재 가격
// ==========================
async function getPrice(symbol){

 const url = `https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`;
 const res = await fetch(url);
 const data = await res.json();

 return parseFloat(data.price);
}

// ==========================
// 24h change
// ==========================
async function get24h(symbol){

 const url = `https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`;
 const res = await fetch(url);
 const data = await res.json();

 return parseFloat(data.priceChangePercent);
}

// ==========================
// 메인 로딩
// ==========================
async function load(){

 let html = "";

 for(let c of coins){

  const price = await getPrice(c.symbol);
  const change = await get24h(c.symbol);
  const closes = await getCandles(c.symbol);

  const rsi = calcRSI(closes).toFixed(1);

  const krw = (price * KRW_RATE).toLocaleString();

  const rsiColor =
    rsi > 70 ? "red" :
    rsi < 30 ? "green" :
    "yellow";

  const chColor =
    change > 0 ? "green" : "red";

  html += `
  <tr>
   <td>${c.name}</td>
   <td>$${price.toFixed(2)}</td>
   <td>₩${krw}</td>
   <td class="${chColor}">${change.toFixed(2)}%</td>
   <td class="${rsiColor}">${rsi}</td>
  </tr>
  `;
 }

 document.getElementById("table").innerHTML = html;
}

// ==========================
// 실행
// ==========================
updateRate();
load();

setInterval(load, 30000);
setInterval(updateRate, 60000);

</script>

</body>
</html>
