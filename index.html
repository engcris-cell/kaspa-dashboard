<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crypto Rank Dashboard</title>

<style>
body{
 margin:0;
 background:#0f1115;
 color:#fff;
 font-family:Arial;
 padding-bottom:80px;
}

header{
 padding:12px;
 text-align:center;
 border-bottom:1px solid #222;
 font-size:15px;
}

#toccataBox{
 padding:12px;
 text-align:center;
 background:#151922;
 border-bottom:1px solid #222;
}

#toccataTitle{
 color:#ffd000;
 font-weight:bold;
}

#toccataCountdown{
 color:#00ff9d;
 font-size:18px;
 font-weight:bold;
}

table{
 width:100%;
 border-collapse:collapse;
 font-size:13px;
 margin-top:10px;
}

th,td{
 padding:8px;
 text-align:center;
 border-bottom:1px solid #222;
}

.green{color:#00ff9d;font-weight:bold;}
.red{color:#ff4d4d;font-weight:bold;}
.yellow{color:#ffd000;font-weight:bold;}

/* BIG BOX */
.box{
 margin:12px;
 padding:14px;
 border-radius:12px;
 font-weight:bold;
 text-align:center;
}

.price{font-size:28px;margin-top:6px;}

.kas{background:#121a14;color:#00ff9d;}
.sui{background:#10131c;color:#6aa8ff;}
.cc{background:#1a1212;color:#ffb84d;}

.rank{
 font-size:12px;
 opacity:0.7;
 margin-bottom:5px;
}

</style>
</head>

<body>

<header>
📊 Crypto Rank Dashboard (24h Ranking)
</header>

<div id="toccataBox">
 <div id="toccataTitle">🚀 Toccata Mainnet (KST)</div>
 <div id="toccataCountdown">loading...</div>
</div>

<!-- BIG BOXES (ranked dynamically) -->
<div id="boxes"></div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>COIN</th>
<th>PRICE</th>
<th>KRW</th>
<th>24h</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

let KRW = 1300;

// ================= FX =================
async function rate(){
 try{
  const r = await fetch("https://open.er-api.com/v6/latest/USD");
  const d = await r.json();
  KRW = d.rates.KRW || 1300;
 }catch(e){}
}

// ================= FETCH =================
async function getPaprika(id){
 try{
  const r = await fetch(`https://api.coinpaprika.com/v1/tickers/${id}`);
  return await r.json();
 }catch(e){
  return null;
 }
}

// ================= TOCCATA =================
function toccata(){
 const target = new Date("2026-07-01T01:15:00+09:00").getTime();
 const now = Date.now();
 const diff = target - now;

 if(diff<=0){
  document.getElementById("toccataCountdown").innerHTML="🚀 LIVE";
  return;
 }

 const d=Math.floor(diff/86400000);
 const h=Math.floor(diff%86400000/3600000);
 const m=Math.floor(diff%3600000/60000);
 const s=Math.floor(diff%60000/1000);

 document.getElementById("toccataCountdown").innerHTML=
 `D-${d} | ${h}h ${m}m ${s}s`;
}

// ================= DATA =================
async function loadData(){

 const list = [
  {id:"kas-kaspa", name:"KAS", cls:"kas"},
  {id:"sui-sui", name:"SUI", cls:"sui"},
  {id:"canton-network", name:"CC", cls:"cc"}
 ];

 let data = [];

 for(const c of list){
  const d = await getPaprika(c.id);

  if(!d) continue;

  const price = d.quotes.USD.price;
  const change = d.quotes.USD.percent_change_24h || 0;

  data.push({
   name:c.name,
   class:c.cls,
   price,
   change
  });
 }

 // ================= RANK SORT (24h) =================
 data.sort((a,b)=>b.change-a.change);

 // ================= BIG BOX RENDER =================
 let boxHTML="";

 data.forEach((c,i)=>{

  const color =
   c.change>0 ? "green" :
   c.change<0 ? "red" : "yellow";

  boxHTML+=`
  <div class="box ${c.class}">
   <div class="rank">#${i+1} (24h Rank)</div>
   ${c.name}
   <div class="price">
    $${c.price.toFixed(6)}
    <br>
    <span class="${color}">
     ${c.change.toFixed(2)}%
    </span>
   </div>
  </div>`;
 });

 document.getElementById("boxes").innerHTML=boxHTML;

 // ================= TABLE =================
 let tableHTML="";

 data.forEach(c=>{

  const color =
   c.change>0 ? "green" :
   c.change<0 ? "red" : "yellow";

  tableHTML+=`
  <tr>
   <td>${c.name}</td>
   <td>$${c.price.toFixed(6)}</td>
   <td>₩${(c.price*KRW).toLocaleString()}</td>
   <td class="${color}">${c.change.toFixed(2)}%</td>
  </tr>`;
 });

 document.getElementById("table").innerHTML=tableHTML;
}

// ================= START =================
async function start(){
 await rate();
 loadData();
 toccata();
}

start();

setInterval(start,30000);
setInterval(toccata,1000);

</script>

</body>
</html>
