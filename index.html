<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crypto Ultimate Dashboard</title>
<meta name="theme-color" content="#0f1115">

<style>
body{
    margin:0;
    background:#0f1115;
    color:#fff;
    font-family:Arial;
    padding-bottom:80px;
}

header{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #222;
    font-size:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}

th,td{
    padding:9px;
    text-align:center;
    border-bottom:1px solid #222;
}

.green{color:#00ff9d;font-weight:bold;}
.red{color:#ff4d4d;font-weight:bold;}
.yellow{color:#ffd000;font-weight:bold;}

#kasBox{
    margin:12px;
    padding:16px;
    background:#121a14;
    border:1px solid #1f2a22;
    border-radius:12px;
    text-align:center;
}

#kasPrice{
    font-size:28px;
    margin-top:6px;
}
</style>
</head>

<body>

<header>
📊 Crypto Ultimate Dashboard<br>
<small>BTC / ETH / ALT / KAS / DEX TOKENS</small>
</header>

<table>
<thead>
<tr>
<th>Coin</th>
<th>USD</th>
<th>KRW</th>
<th>24h</th>
<th>Source</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div id="kasBox">
💰 KASPA
<div id="kasPrice">loading...</div>
</div>

<script>

// ================= KRW =================
let KRW = 1300;

// ================= BINANCE =================
const binance = [
 {s:"BTCUSDT",n:"BTC"},
 {s:"ETHUSDT",n:"ETH"}
];

// ================= COINGECKO =================
const gecko = [
 "kaspa",
 "sui",
 "bittensor",
 "near",
 "ripple",
 "stellar"
];

// ================= DEX TOKENS =================
const dexTokens = ["zeal","igra","kaskad"];

// ================= BINANCE =================
async function getBinance(symbol){

 try{
   const p = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`).then(r=>r.json());
   const c = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`).then(r=>r.json());

   return {
     price:+p.price,
     change:+c.priceChangePercent,
     source:"CEX"
   };
 }catch(e){
   return null;
 }
}

// ================= COINGECKO =================
async function getGecko(){

 try{
   const url=`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${gecko.join(",")}`;
   const r=await fetch(url);
   return await r.json();
 }catch(e){
   return [];
 }
}

// ================= DEX PRICE (SAFE) =================
async function getDexPrice(token){

 try{
   const res = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${token}`);
   const data = await res.json();

   const price = data?.pairs?.[0]?.priceUsd;

   if(price){
     return {
       price: parseFloat(price),
       source:"DEX"
     };
   }

   return null;

 }catch(e){
   return null;
 }
}

// ================= MAIN LOAD =================
async function load(){

 let html="";

 // BTC / ETH
 for(const c of binance){

   const d = await getBinance(c.s);
   if(!d) continue;

   const krw = (d.price * KRW).toLocaleString();

   const chColor =
   d.change>0?"green":
   d.change<0?"red":"yellow";

   html+=`
   <tr>
     <td>${c.n}</td>
     <td>$${d.price.toFixed(2)}</td>
     <td>₩${krw}</td>
     <td class="${chColor}">${d.change.toFixed(2)}%</td>
     <td>${d.source}</td>
   </tr>`;
 }

 // ALT COINS
 const g = await getGecko();

 g.forEach(c=>{
   if(!c||!c.current_price) return;

   const krw = (c.current_price * KRW).toLocaleString();

   html+=`
   <tr>
     <td>${c.symbol.toUpperCase()}</td>
     <td>$${c.current_price.toFixed(4)}</td>
     <td>₩${krw}</td>
     <td class="yellow">${c.price_change_percentage_24h?.toFixed(2)||0}%</td>
     <td>GECKO</td>
   </tr>`;
 });

 // ================= DEX TOKENS =================
 for(const t of dexTokens){

   const d = await getDexPrice(t);

   if(!d){
     html+=`
     <tr>
       <td>${t.toUpperCase()}</td>
       <td colspan="4" class="yellow">NO DATA</td>
     </tr>`;
     continue;
   }

   const krw = (d.price * KRW).toLocaleString();

   html+=`
   <tr>
     <td>${t.toUpperCase()}</td>
     <td>$${d.price.toFixed(6)}</td>
     <td>₩${krw}</td>
     <td class="yellow">--</td>
     <td>${d.source}</td>
   </tr>`;
 }

 document.getElementById("table").innerHTML = html;
}

// ================= KAS =================
async function kas(){

 try{
   const r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=kaspa&vs_currencies=usd,krw&include_24hr_change=true");
   const d = await r.json();

   if(d.kaspa){
     document.getElementById("kasPrice").innerHTML =
     `$${d.kaspa.usd} | ₩${d.kaspa.krw.toLocaleString()}`;
   }

 }catch(e){
   document.getElementById("kasPrice").innerHTML="KAS FAIL";
 }
}

// ================= START =================
load();
kas();

setInterval(load,30000);
setInterval(kas,15000);

</script>

</body>
</html>
