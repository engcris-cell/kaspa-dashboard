<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crypto Ultimate Dashboard</title>
<meta name="theme-color" content="#0f1115">

<style>
body{
    margin:0;
    background:#0f1115;
    color:#fff;
    font-family:Arial,sans-serif;
    padding-bottom:80px;
}

header{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #222;
    font-size:15px;
}

#toccataBox{
    padding:12px;
    text-align:center;
    background:#151922;
    border-bottom:1px solid #222;
}

#toccataTitle{
    color:#ffd000;
    font-weight:bold;
}

#toccataCountdown{
    color:#00ff9d;
    font-size:18px;
    font-weight:bold;
    margin-top:5px;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}

th,td{
    padding:9px;
    text-align:center;
    border-bottom:1px solid #222;
}

.green{ color:#00ff9d; font-weight:bold; }
.red{ color:#ff4d4d; font-weight:bold; }
.yellow{ color:#ffd000; font-weight:bold; }

/* KAS BOX */
#kasBigBox{
    margin:12px;
    padding:16px;
    text-align:center;
    background:#121a14;
    border:1px solid #1f2a22;
    border-radius:12px;
    color:#00ff9d;
    font-weight:bold;
}

#kasPrice{
    font-size:28px;
    margin-top:6px;
}

#kasChange{
    margin-top:6px;
    font-size:14px;
}
</style>
</head>

<body>

<header>
📊 Crypto Ultimate Dashboard
<br>
<small>BTC / ETH / ALT + KAS LIVE</small>
</header>

<div id="toccataBox">
    <div id="toccataTitle">
        🚀 Toccata Mainnet (KST)
    </div>
    <div id="toccataCountdown">계산중...</div>
</div>

<table>
<thead>
<tr>
<th>코인</th>
<th>USD</th>
<th>KRW</th>
<th>24h</th>
<th>RSI</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<!-- 🔥 KAS BIG BOX -->
<div id="kasBigBox">
    💰 KASPA
    <div id="kasPrice">loading...</div>
    <div id="kasChange"></div>
</div>

<script>

// =======================
// KRW RATE
// =======================
let KRW_RATE = 1300;

// =======================
// BINANCE
// =======================
const binanceCoins = [
 {symbol:"BTCUSDT",name:"BTC"},
 {symbol:"ETHUSDT",name:"ETH"}
];

// =======================
// COINGECKO
// =======================
const geckoCoins = [
 "kaspa",
 "sui",
 "bittensor",
 "ondo-finance",
 "near",
 "stellar",
 "ripple"
];

// =======================
// RSI
// =======================
function calcRSI(closes, period=14){
 if(closes.length < period + 1) return 50;

 let gain = 0;
 let loss = 0;

 for(let i=closes.length-period;i<closes.length;i++){
   let diff = closes[i] - closes[i-1];
   if(diff > 0) gain += diff;
   else loss += Math.abs(diff);
 }

 let rs = (gain/period) / (loss/period || 1);
 return 100 - (100/(1+rs));
}

// =======================
// TOCCATA (KST)
// =======================
function updateToccata(){

 const target =
 new Date("2026-07-01T01:15:00+09:00").getTime();

 const now = Date.now();
 const diff = target - now;

 if(diff <= 0){
   document.getElementById("toccataCountdown").innerHTML =
   "🚀 LIVE";
   return;
 }

 const d = Math.floor(diff/86400000);
 const h = Math.floor(diff%86400000/3600000);
 const m = Math.floor(diff%3600000/60000);
 const s = Math.floor(diff%60000/1000);

 document.getElementById("toccataCountdown").innerHTML =
 `D-${d} | ${h}h ${m}m ${s}s`;
}

// =======================
// FX RATE
// =======================
async function updateRate(){
 try{
   const res = await fetch("https://open.er-api.com/v6/latest/USD");
   const data = await res.json();
   KRW_RATE = data.rates.KRW || 1300;
 }catch(e){}
}

// =======================
// BINANCE
// =======================
async function getBinance(symbol){

 const price = await fetch(
 `https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`
 ).then(r=>r.json());

 const change = await fetch(
 `https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`
 ).then(r=>r.json());

 const candles = await fetch(
 `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1m&limit=50`
 ).then(r=>r.json());

 const closes = candles.map(c=>+c[4]);

 return {
   price:+price.price,
   change:+change.priceChangePercent,
   rsi:calcRSI(closes)
 };
}

// =======================
// COINGECKO TABLE
// =======================
async function getGecko(){
 const url =
 `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${geckoCoins.join(",")}`;
 const res = await fetch(url);
 return await res.json();
}

// =======================
// MAIN TABLE
// =======================
async function load(){

 let html = "";

 for(const c of binanceCoins){

   const d = await getBinance(c.symbol);

   const krw = (d.price * KRW_RATE).toLocaleString();

   const chColor =
   d.change > 0 ? "green" :
   d.change < 0 ? "red" : "yellow";

   const rsiColor =
   d.rsi > 70 ? "red" :
   d.rsi < 30 ? "green" : "yellow";

   html += `
   <tr>
     <td>${c.name}</td>
     <td>$${d.price.toFixed(2)}</td>
     <td>₩${krw}</td>
     <td class="${chColor}">${d.change.toFixed(2)}%</td>
     <td class="${rsiColor}">${d.rsi.toFixed(1)}</td>
   </tr>`;
 }

 const alts = await getGecko();

 alts.forEach(c=>{
   const krw = (c.current_price * KRW_RATE).toLocaleString();
   const ch = c.price_change_percentage_24h || 0;

   const color =
   ch > 0 ? "green" :
   ch < 0 ? "red" : "yellow";

   html += `
   <tr>
     <td>${c.symbol.toUpperCase()}</td>
     <td>$${c.current_price.toFixed(4)}</td>
     <td>₩${krw}</td>
     <td class="${color}">${ch.toFixed(2)}%</td>
     <td>--</td>
   </tr>`;
 });

 document.getElementById("table").innerHTML = html;
}

// =======================
// 🔥 KAS (STABLE + FALLBACK)
// =======================
async function updateKas(){

 try{

   // 1차 CoinGecko
   const res = await fetch(
   "https://api.coingecko.com/api/v3/simple/price?ids=kaspa&vs_currencies=usd,krw&include_24hr_change=true"
   );

   const data = await res.json();

   if(data.kaspa){

     const price = data.kaspa.usd;
     const krw = data.kaspa.krw;
     const change = data.kaspa.usd_24h_change;

     document.getElementById("kasPrice").innerHTML =
     `$${price} | ₩${krw.toLocaleString()}`;

     const color =
     change > 0 ? "green" :
     change < 0 ? "red" : "yellow";

     document.getElementById("kasChange").innerHTML =
     `<span class="${color}">24h ${change.toFixed(2)}%</span>`;

     return;
   }

   throw new Error("fallback");

 }catch(e){

   // 2차 Binance fallback
   try{

     const res = await fetch(
     "https://api.binance.com/api/v3/ticker/price?symbol=KASUSDT"
     );

     const d = await res.json();

     document.getElementById("kasPrice").innerHTML =
     `$${(+d.price).toFixed(6)} (Binance)`;

     document.getElementById("kasChange").innerHTML =
     `<span class="yellow">fallback mode</span>`;

   }catch(err){

     document.getElementById("kasPrice").innerHTML =
     "KAS 연결 실패";

   }
 }
}

// =======================
// START
// =======================
updateRate();
load();
updateKas();
updateToccata();

setInterval(load,30000);
setInterval(updateRate,60000);
setInterval(updateKas,15000);
setInterval(updateToccata,1000);

</script>

</body>
</html>
