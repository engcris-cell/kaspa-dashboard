<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hybrid Crypto Dashboard</title>

<style>
body{
 margin:0;
 background:#0f1115;
 color:#fff;
 font-family:Arial;
 padding-bottom:80px;
}

header{
 padding:12px;
 text-align:center;
 border-bottom:1px solid #222;
 font-size:15px;
}

#toccataBox{
 padding:12px;
 text-align:center;
 background:#151922;
 border-bottom:1px solid #222;
}

#toccataTitle{
 color:#ffd000;
 font-weight:bold;
}

#toccataCountdown{
 color:#00ff9d;
 font-size:18px;
 font-weight:bold;
}

.box{
 margin:12px;
 padding:14px;
 border-radius:12px;
 font-weight:bold;
 text-align:center;
}

.price{font-size:28px;margin-top:6px;}

.kas{background:#121a14;color:#00ff9d;}
.btc{background:#1a1411;color:#ff9d00;}
.eth{background:#12131a;color:#8c8cff;}
.sol{background:#141a12;color:#7dffb2;}
.sui{background:#10131c;color:#6aa8ff;}

table{
 width:100%;
 border-collapse:collapse;
 font-size:13px;
 margin-top:10px;
}

th,td{
 padding:8px;
 text-align:center;
 border-bottom:1px solid #222;
}

.green{color:#00ff9d;font-weight:bold;}
.red{color:#ff4d4d;font-weight:bold;}
.yellow{color:#ffd000;font-weight:bold;}

.rank{
 font-size:12px;
 opacity:0.7;
 margin-bottom:5px;
}

</style>
</head>

<body>

<header>
📊 Hybrid Crypto Dashboard (Binance + KAS)
</header>

<div id="toccataBox">
 <div id="toccataTitle">🚀 Toccata Mainnet (KST)</div>
 <div id="toccataCountdown">loading...</div>
</div>

<div id="boxes"></div>

<table>
<thead>
<tr>
<th>COIN</th>
<th>PRICE</th>
<th>KRW</th>
<th>24h</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

let KRW = 1300;

// ================= FX =================
async function rate(){
 try{
  const r = await fetch("https://open.er-api.com/v6/latest/USD");
  const d = await r.json();
  if(d?.rates?.KRW) KRW = d.rates.KRW;
 }catch(e){}
}

// ================= BINANCE =================
async function binance(symbol){
 try{
  const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`);
  return await r.json();
 }catch(e){
  return null;
 }
}

// ================= COINGECKO (KAS ONLY) =================
async function kaspa(){
 try{
  const r = await fetch(
   "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=kaspa"
  );
  const d = await r.json();
  return d?.[0] || null;
 }catch(e){
  return null;
 }
}

// ================= TOCCATA =================
function toccata(){
 const target = new Date("2026-07-01T01:15:00+09:00").getTime();
 const now = Date.now();
 const diff = target - now;

 if(diff<=0){
  document.getElementById("toccataCountdown").innerHTML="🚀 LIVE";
  return;
 }

 const d=Math.floor(diff/86400000);
 const h=Math.floor(diff%86400000/3600000);
 const m=Math.floor(diff%3600000/60000);
 const s=Math.floor(diff%60000/1000);

 document.getElementById("toccataCountdown").innerHTML=
 `D-${d} | ${h}h ${m}m ${s}s`;
}

// ================= SAFE STATE =================
let last = {};

// ================= MAIN =================
async function load(){

 // ===== Binance coins =====
 const b = await Promise.all([
  binance("BTCUSDT"),
  binance("ETHUSDT"),
  binance("SOLUSDT"),
  binance("SUIUSDT")
 ]);

 // ===== KAS =====
 const k = await kaspa();

 // ===== build data =====
 let data = [];

 if(b[0]) data.push({name:"BTC", price:+b[0].lastPrice, change:+b[0].priceChangePercent, cls:"btc"});
 if(b[1]) data.push({name:"ETH", price:+b[1].lastPrice, change:+b[1].priceChangePercent, cls:"eth"});
 if(b[2]) data.push({name:"SOL", price:+b[2].lastPrice, change:+b[2].priceChangePercent, cls:"sol"});
 if(b[3]) data.push({name:"SUI", price:+b[3].lastPrice, change:+b[3].priceChangePercent, cls:"sui"});

 if(k) data.push({
  name:"KAS",
  price:k.current_price,
  change:k.price_change_percentage_24h,
  cls:"kas"
 });

 if(data.length>0) last=data;
 data = last;

 // ===== BIG BOX (KAS + SUI only) =====
 const big = data.filter(c=>c.name==="KAS"||c.name==="SUI");

 let bigHtml="";

 big.forEach((c,i)=>{

  const color =
   c.change>0 ? "green" :
   c.change<0 ? "red" : "yellow";

  bigHtml+=`
  <div class="box ${c.cls}">
   <div class="rank">#${i+1}</div>
   ${c.name}
   <div class="price">
    $${c.price}
    <br>
    <span class="${color}">
     ${c.change.toFixed(2)}%
    </span>
   </div>
  </div>`;
 });

 document.getElementById("boxes").innerHTML=bigHtml;

 // ===== TABLE =====
 let table="";

 data.forEach(c=>{

  const color =
   c.change>0 ? "green" :
   c.change<0 ? "red" : "yellow";

  table+=`
  <tr>
   <td>${c.name}</td>
   <td>$${c.price}</td>
   <td>₩${(c.price*KRW).toLocaleString()}</td>
   <td class="${color}">${c.change.toFixed(2)}%</td>
  </tr>`;
 });

 document.getElementById("table").innerHTML=table;
}

// ================= START =================
async function start(){
 await rate();
 await load();
 toccata();
}

start();

setInterval(start,30000);
setInterval(toccata,1000);

</script>

</body>
</html>
