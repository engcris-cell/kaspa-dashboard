<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Kaspa Dashboard</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    margin:0;
}

.header{
    display:flex;
    justify-content:center;
    gap:40px;
    padding:20px;
    background:#1a1a1a;
}

.card{
    text-align:center;
}

.label{
    color:#999;
    font-size:14px;
}

.value{
    font-size:30px;
    font-weight:bold;
}

.green{
    color:#00d26a;
}

.red{
    color:#ff4d4d;
}

#tradingview_chart{
    height:700px;
}
</style>
</head>

<body>

<div class="header">

    <div class="card">
        <div class="label">KAS/USD</div>
        <div class="value" id="usdPrice">-</div>
    </div>

    <div class="card">
        <div class="label">KAS/KRW</div>
        <div class="value" id="krwPrice">-</div>
    </div>

    <div class="card">
        <div class="label">24H</div>
        <div class="value" id="change24h">-</div>
    </div>

</div>

<div id="tradingview_chart"></div>

<script>
async function updatePrice(){

    try{

        const response = await fetch(
        "https://api.coingecko.com/api/v3/coins/kaspa");

        const data = await response.json();

        const usd =
        data.market_data.current_price.usd;

        const krw =
        data.market_data.current_price.krw;

        const change =
        data.market_data.price_change_percentage_24h;

        document.getElementById("usdPrice")
        .innerText =
        "$" + usd.toFixed(4);

        document.getElementById("krwPrice")
        .innerText =
        "₩" + krw.toLocaleString();

        const element =
        document.getElementById("change24h");

        element.innerText =
        change.toFixed(2)+"%";

        if(change >= 0){
            element.className="value green";
        }else{
            element.className="value red";
        }

    }catch(e){
        console.log(e);
    }
}

updatePrice();
setInterval(updatePrice,30000);
</script>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
new TradingView.widget(
{
  "autosize": true,
  "symbol": "MEXC:KASUSDT",
  "interval": "60",
  "timezone": "Asia/Seoul",
  "theme": "dark",
  "style": "1",
  "locale": "kr",
  "toolbar_bg": "#111",
  "enable_publishing": false,
  "allow_symbol_change": true,
  "container_id": "tradingview_chart"
});
</script>

</body>
</html>
